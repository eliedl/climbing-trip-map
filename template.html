<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Carte escalade — Écrins &amp; Queyras</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #map{position:absolute;inset:0}
  #panel{position:absolute;top:10px;left:10px;z-index:1000;background:rgba(255,255,255,.95);
    backdrop-filter:blur(4px);border-radius:12px;padding:12px 14px;box-shadow:0 4px 18px rgba(0,0,0,.28);
    max-width:min(72vw,250px);max-height:80vh;overflow:auto;font-size:13px}
  #panel h1{font-size:15px;margin:0 0 2px}
  .sub{font-size:12px;color:#555;margin:0 0 10px}
  .toggles{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;
    border-bottom:1px solid #eee;padding-bottom:10px}
  .toggles label{display:flex;align-items:center;gap:7px}
  .toggles label.child{margin-left:22px;font-size:12px;color:#555}
  #legend{display:flex;flex-direction:column;gap:6px}
  .lg{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .lg .dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.3);flex:none}
  .lg.off{opacity:.35}
  #collapse{position:absolute;top:6px;right:8px;border:none;background:none;font-size:18px;
    line-height:1;cursor:pointer;color:#999;padding:2px}
  .leaflet-popup-content{font-size:13px;line-height:1.45;margin:10px 12px}
  .leaflet-popup-content h3{margin:0 0 4px;font-size:14px}
  .leaflet-popup-content .reg{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:#777}
  .stars{color:#e8a400}
  .camp-icon{font-size:22px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5))}
  /* orientation marker: rotatable white teardrop (stroke + point) under a region-coloured disk */
  .pin{position:relative;width:var(--d);height:var(--d)}
  .beak,.core{position:absolute;inset:0}
  .beak{background:#fff;opacity:var(--strokeOpacity);border-radius:0 50% 50% 50%;
    transform:rotate(calc(45deg + var(--deg)));transform-origin:center}
  .core{margin:auto;width:calc(var(--d) - 7px);height:calc(var(--d) - 7px);
    background:var(--color);opacity:var(--fillOpacity);border-radius:50%}
  .pin.tous .beak{border-radius:50%;transform:none}  /* directionless disk */
  /* itinerary date: black label in a white pill, pinned top-right of the marker */
  .date-pill{position:absolute;left:6px;bottom:6px;background:#fff;border-radius:999px;
    padding:2px 8px;box-shadow:0 1px 4px rgba(0,0,0,.35);white-space:nowrap;pointer-events:none}
  .date-pill p{margin:0;color:#000;font-size:11px;font-weight:600;line-height:1.35}
  /* planned routes: indented, fixed-height scroll list inside the itinerary popup */
  .pr-title{margin:8px 0 3px;font-weight:600}
  .planned-routes{margin-left:10px;max-height:120px;overflow-y:scroll;
    -webkit-overflow-scrolling:touch;border-left:2px solid #eee;padding-left:7px}
  .planned-routes .route{display:flex;gap:8px;font-size:12px;line-height:1.6}
  .planned-routes .num{color:#999;min-width:1.6em;text-align:right;flex:none}
  .planned-routes .name{flex:1}
  .planned-routes .grade{color:#333;white-space:nowrap;flex:none}
  .planned-routes .len{color:#777;white-space:nowrap;flex:none}
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <button id="collapse" title="Réduire">–</button>
  <h1>Escalade — Écrins &amp; Queyras</h1>
  <p class="sub">__NSITES__ secteurs · __NCAMPS__ bivouacs</p>
  <div class="toggles">
    <label><input type="checkbox" id="tgSites" checked> Secteurs d'escalade</label>
    <label class="child"><input type="checkbox" id="triggerItinerary"> Itinéraire</label>
    <label><input type="checkbox" id="tgCamps" checked> Bivouacs ⛺</label>
  </div>
  <div id="legend"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SITES = __SITES__;
const CAMPS = __CAMPS__;
const COLORS = __COLORS__;

const map = L.map('map', {scrollWheelZoom: true});
L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  maxZoom: 17,
  attribution: '© OpenTopoMap (CC-BY-SA) · © OpenStreetMap contributors'
}).addTo(map);

const esc = s => (s == null ? '' : String(s)).replace(/[&<>]/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const stars = n => {
  n = parseInt(n) || 0;
  return n ? '<span class="stars">' + '★'.repeat(n) + '</span>' : '';
};
const line = (label, value) => value ? '<div>' + label + esc(value) + '</div>' : '';

// --- climbing sectors, one Leaflet layer group per region ---
const siteLayers = {};
const activeRegions = new Set(Object.keys(COLORS));
const SENTINEL_DEGREE = -9;   // "tous": directionless disk, no point

const orientIcon = s => {
  const d = 2 * s.radius;
  const tous = s.degree === SENTINEL_DEGREE;
  const html = '<div class="pin' + (tous ? ' tous' : '') + '" style="' +
    '--d:' + d + 'px;--deg:' + s.degree + 'deg;--color:' + (COLORS[s.region] || '#888') +
    ';--fillOpacity:' + s.fillOpacity + ';--strokeOpacity:' + s.strokeOpacity + '">' +
    '<div class="beak"></div><div class="core"></div></div>';
  return L.divIcon({className: '', html, iconSize: [d, d], iconAnchor: [d / 2, d / 2]});
};

// itinerary date label: a zero-size anchor at the marker point; the pill inside is
// offset up-and-right in CSS, so the offset is fixed pixels regardless of label width.
const dateIcon = s => {
  const html = '<div class="date-pill"><p>' + esc(s.plan.label) + '</p></div>';
  return L.divIcon({className: '', html, iconSize: [0, 0], iconAnchor: [0, 0]});
};

// planned sites (on the itinerary) get a second marker in their own layer group
const itineraryLayer = L.layerGroup();

SITES.forEach(s => {
  const starRow = (s.stars.lolo || s.stars.elie)
    ? '<div>Lolo ' + stars(s.stars.lolo) + ' · Élie ' + stars(s.stars.elie) + '</div>' : '';
  const faceTxt = s.orientation.degree === SENTINEL_DEGREE ? 'toutes orientations' : s.orientation.label;
  const popup =
    '<div class="reg">' + esc(s.region) + (s.subregion ? ' · ' + esc(s.subregion) : '') + '</div>' +
    '<h3>' + esc(s.name) + '</h3>' +
    starRow +
    '<div>' + [s.type, s.rock, faceTxt].filter(Boolean).map(esc).join(' · ') + '</div>' +
    line('Cotation ', s.grade) + line('Longueur ', s.length && s.length + ' m') +
    line('Approche ', s.approach && s.approach + ' min') + line('Altitude ', s.altitude && s.altitude + ' m') +
    line('Topo p.', s.page) +
    (s.comment ? '<div style="margin-top:4px">' + esc(s.comment) + '</div>' : '');

  const marker = L.marker([s.lat, s.lon], {icon: orientIcon(s)}).bindPopup(popup);
  (siteLayers[s.region] = siteLayers[s.region] || L.layerGroup()).addLayer(marker);

  if (s.plan.planned) {
    const routes = s.voies.map(v =>
      '<div class="route"><span class="num">' + esc(v.number) + '</span>' +
      '<span class="name">' + esc(v.name) + '</span>' +
      '<span class="grade">' + esc(v.grade) + '</span>' +
      '<span class="len">' + esc(v.length) + ' m</span></div>').join('');
    const planned = '<div class="pr-title">Voies planifiées</div>' +
      '<div class="planned-routes">' + routes + '</div>';
    L.marker([s.lat, s.lon], {icon: orientIcon(s)}).bindPopup(popup + planned).addTo(itineraryLayer);
    L.marker([s.lat, s.lon], {icon: dateIcon(s), interactive: false}).addTo(itineraryLayer);
  }
});
Object.values(siteLayers).forEach(l => l.addTo(map));

// --- bivouac spots ---
const campLayer = L.layerGroup();
CAMPS.forEach(c => {
  const icon = L.divIcon({
    className: '', html: '<div class="camp-icon">⛺</div>',
    iconSize: [22, 22], iconAnchor: [11, 20]
  });
  L.marker([c.lat, c.lon], {icon}).bindPopup(
    '<div class="reg">Bivouac' + (c.near ? ' · ' + esc(c.near) : '') + '</div>' +
    '<h3>' + esc(c.name || 'Spot') + '</h3>' +
    (c.infos ? '<div>' + esc(c.infos) + '</div>' : '')
  ).addTo(campLayer);
});
campLayer.addTo(map);

// --- fit to all points ---
map.fitBounds([...SITES, ...CAMPS].map(p => [p.lat, p.lon]), {padding: [40, 40]});

// --- legend (click a region to toggle it) ---
const legend = document.getElementById('legend');
Object.keys(COLORS).sort().forEach(region => {
  const row = document.createElement('div');
  row.className = 'lg';
  row.innerHTML = '<span class="dot" style="background:' + COLORS[region] + '"></span><span>' + esc(region) + '</span>';
  row.onclick = () => {
    if (activeRegions.has(region)) {
      activeRegions.delete(region); map.removeLayer(siteLayers[region]); row.classList.add('off');
    } else {
      activeRegions.add(region); siteLayers[region].addTo(map); row.classList.remove('off');
    }
  };
  legend.appendChild(row);
});

// --- master toggles ---
const tgSites = document.getElementById('tgSites');
const triggerItinerary = document.getElementById('triggerItinerary');

const showSiteLayers = on => Object.keys(siteLayers).forEach(region => {
  if (on && activeRegions.has(region)) siteLayers[region].addTo(map);
  else map.removeLayer(siteLayers[region]);
});

// Sectors and itinerary are mutually exclusive: turning one on turns the other off.
tgSites.onchange = e => {
  if (e.target.checked && triggerItinerary.checked) {
    triggerItinerary.checked = false;
    map.removeLayer(itineraryLayer);
  }
  showSiteLayers(e.target.checked);
};
triggerItinerary.onchange = e => {
  if (e.target.checked && tgSites.checked) {
    tgSites.checked = false;
    showSiteLayers(false);
  }
  if (e.target.checked) itineraryLayer.addTo(map); else map.removeLayer(itineraryLayer);
};

document.getElementById('tgCamps').onchange = e => {
  if (e.target.checked) campLayer.addTo(map); else map.removeLayer(campLayer);
};

// --- collapse panel (handy on a phone) ---
const panel = document.getElementById('panel');
document.getElementById('collapse').onclick = () => {
  const hidden = panel.classList.toggle('collapsed');
  panel.querySelectorAll('h1,.sub,.toggles,#legend').forEach(el => el.style.display = hidden ? 'none' : '');
  document.getElementById('collapse').textContent = hidden ? '+' : '–';
};
</script>
</body>
</html>
